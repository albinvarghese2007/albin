<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: white;
        }
        header {
            background: #1e293b;
            padding: 20px;
            text-align: center;
        }
        nav a {
            color: #38bdf8;
            margin: 0 10px;
            text-decoration: none;
        }
        section {
            padding: 40px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
        button {
            background: #38bdf8;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Portfolio</h1>
    <p>Web Developer | Student | Creator</p>
    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>Hello! I'm a beginner developer learning web development.</p>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="card">
        <h3>Project 1</h3>
        <p>A cool project description.</p>
    </div>
    <div class="card">
        <h3>Project 2</h3>
        <p>Another awesome project.</p>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <button onclick="showMessage()">Say Hello</button>
</section>

<script>
function showMessage() {
    alert("Thanks for visiting my portfolio!");
}
</script>

</body>
</html>
